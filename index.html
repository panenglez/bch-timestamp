<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>BCH Notary - Cloud Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mainnet-js/1.1.18/mainnet.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; }
        input, button { width: 100%; margin: 10px 0; padding: 12px; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #00d54b; color: white; border: none; font-weight: bold; cursor: pointer; height: 50px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #log { background: #222; color: #0f0; padding: 15px; font-family: monospace; font-size: 11px; border-radius: 5px; min-height: 80px; word-break: break-all; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:#00d54b; text-align:center;">BCH Notary</h2>
    <input type="password" id="wif" placeholder="WIF Private Key">
    <input type="file" id="file">
    <button id="mainBtn" onclick="run()" disabled>ΦΟΡΤΩΣΗ ONLINE...</button>
    <div id="log">Status: Προσπάθεια σύνδεσης με Cloudflare...</div>
</div>

<script>
    const log = document.getElementById('log');
    const btn = document.getElementById('mainBtn');

    // Έλεγχος αν η βιβλιοθήκη φορτώθηκε
    function checkLibrary() {
        if (typeof window.mainnet !== 'undefined') {
            log.innerText = "✅ Η βιβλιοθήκη φορτώθηκε online!";
            btn.disabled = false;
            btn.innerText = "TIMESTAMP ON BLOCKCHAIN";
        } else {
            log.innerText = "⏳ Αναμονή για τη βιβλιοθήκη (δοκιμή 2)...";
            // Αν αποτύχει το Cloudflare, δοκιμάζουμε δυναμικά το Skypack
            const s = document.createElement('script');
            s.src = "https://cdn.skypack.dev/mainnet-js";
            document.head.appendChild(s);
        }
    }

    // Περιμένουμε λίγο για το φόρτωμα
    setTimeout(checkLibrary, 2000);

    async function run() {
        try {
            const wif = document.getElementById('wif').value;
            const file = document.getElementById('file').files[0];
            
            log.innerText = "🔑 Άνοιγμα πορτοφαλιού...";
            const wallet = await window.mainnet.Wallet.fromWIF(wif);
            
            log.innerText = "📄 Hash αρχείου...";
            const buffer = await file.arrayBuffer();
            const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
            const hash = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');

            log.innerText = "🚀 Αποστολή στο Blockchain...";
            const { txId } = await wallet.send([{ opReturn: ["0x6d02", hash] }]);
            
            log.innerHTML = "✅ ΕΠΙΤΥΧΙΑ!<br>TX: <a href='https://blockchair.com/bitcoin-cash/transaction/" + txId + "' target='_blank' style='color:#0f0'>" + txId + "</a>";
        } catch (e) {
            log.innerText = "❌ ΣΦΑΛΜΑ: " + e.message;
        }
    }
</script>
</body>
</html>
