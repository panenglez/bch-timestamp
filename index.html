<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BCH Timestamp</title>

<script src="https://cdn.jsdelivr.net/npm/mainnet-js@2.7.19/dist/mainnet.browser.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
padding-top:60px;
}

.card{
background:white;
padding:30px;
width:420px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
}

button{
background:#00c853;
color:white;
border:none;
font-weight:bold;
cursor:pointer;
}

#log{
margin-top:15px;
background:black;
color:#00ff00;
padding:10px;
font-family:monospace;
font-size:12px;
min-height:90px;
word-break:break-all;
}

</style>
</head>

<body>

<div class="card">

<h2>BCH File Timestamp</h2>

<input type="password" id="wif" placeholder="Paste WIF private key">

<input type="file" id="file">

<button onclick="timestamp()">Timestamp File</button>

<div id="log">Ready.</div>

</div>

<script>

async function sha256(file){

const buffer = await file.arrayBuffer()

const hashBuffer = await crypto.subtle.digest("SHA-256",buffer)

return Array.from(new Uint8Array(hashBuffer))
.map(b=>b.toString(16).padStart(2,"0"))
.join("")

}

async function timestamp(){

const log = document.getElementById("log")

const wif = document.getElementById("wif").value
const file = document.getElementById("file").files[0]

if(!wif || !file){
alert("Insert WIF and file")
return
}

try{

log.innerText="Hashing file..."

const hash = await sha256(file)

log.innerText="File hash:\n"+hash+"\n\nLoading wallet..."

const wallet = await mainnet.Wallet.fromWIF(wif)

log.innerText="Sending BCH transaction..."

const result = await wallet.send([
{
opReturn:[hash]
}
])

log.innerHTML =
"SUCCESS\n\nTXID:\n"+
result.txId+
"\n\nExplorer:\n"+
"https://blockchair.com/bitcoin-cash/transaction/"+result.txId

}catch(e){

log.innerText="ERROR:\n"+e.message

}

}

</script>

</body>
</html>
