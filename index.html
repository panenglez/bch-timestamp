<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>BCH Notary - Firefox Ready</title>
    <script src="https://unpkg.com/mainnet-js/dist/mainnet.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; }
        input, button { width: 100%; margin: 10px 0; padding: 12px; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #00d54b; color: white; border: none; font-weight: bold; cursor: pointer; height: 50px; }
        button:disabled { background: #ccc; cursor: wait; }
        #log { background: #222; color: #0f0; padding: 15px; font-family: monospace; font-size: 11px; border-radius: 5px; min-height: 80px; word-break: break-all; white-space: pre-wrap; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:#00d54b; text-align:center;">BCH Notary</h2>
    <input type="password" id="wif" placeholder="Επικόλλησε το WIF">
    <input type="file" id="file">
    
    <button id="mainBtn" onclick="doWork()" disabled>ΠΑΡΑΚΑΛΩ ΠΕΡΙΜΕΝΕΤΕ...</button>
    
    <div id="log">Status: Ο Firefox φορτώνει τη βιβλιοθήκη (7MB)...</div>
</div>

<script>
    const btn = document.getElementById('mainBtn');
    const log = document.getElementById('log');

    // Συνάρτηση που ελέγχει κάθε δευτερόλεπτο αν ο Firefox "ξεκλείδωσε" τη βιβλιοθήκη
    const checker = setInterval(() => {
        if (window.mainnet) {
            log.innerText = "✅ Η βιβλιοθήκη φορτώθηκε! Έτοιμος.";
            btn.disabled = false;
            btn.innerText = "TIMESTAMP NOW";
            clearInterval(checker);
        }
    }, 1000);

    async function doWork() {
        const wif = document.getElementById('wif').value.trim();
        const file = document.getElementById('file').files[0];

        if (!wif || !file) return alert("Συμπλήρωσε τα πεδία!");

        try {
            btn.disabled = true;
            btn.innerText = "ΕΠΕΞΕΡΓΑΣΙΑ...";
            
            log.innerText = "1. Υπολογισμός Hash...";
            const buffer = await file.arrayBuffer();
            const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
            const hash = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');

            log.innerText = "2. Σύνδεση με το Πορτοφόλι...";
            const wallet = await window.mainnet.Wallet.fromWIF(wif);
            
            log.innerText = "3. Αποστολή στο Blockchain...";
            const { txId } = await wallet.send([{ opReturn: ["0x6d02", hash] }]);

            log.innerHTML = `✅ ΕΠΙΤΥΧΙΑ!<br><br>TXID:<br><a href="https://blockchair.com/bitcoin-cash/transaction/${txId}" target="_blank" style="color:#0f0">${txId}</a>`;
            btn.innerText = "ΟΛΟΚΛΗΡΩΘΗΚΕ";
        } catch (e) {
            log.innerText = "❌ ΣΦΑΛΜΑ: " + e.message;
            btn.disabled = false;
            btn.innerText = "TIMESTAMP NOW";
        }
    }
</script>
</body>
</html>
