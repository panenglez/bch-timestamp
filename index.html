<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>BCH Notary Lite</title>
    <script src="https://unpkg.com/cashscript@0.10.1/dist/cashscript.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; }
        input, button { width: 100%; margin: 10px 0; padding: 12px; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #00d54b; color: white; border: none; font-weight: bold; cursor: pointer; }
        #log { background: #222; color: #0f0; padding: 15px; font-family: monospace; font-size: 11px; border-radius: 5px; min-height: 80px; word-break: break-all; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:#00d54b; text-align:center;">BCH Notary Lite</h2>
    <input type="password" id="wif" placeholder="Επικόλλησε το WIF">
    <input type="file" id="file">
    <button onclick="start()">TIMESTAMP NOW</button>
    <div id="log">Status: Ready.</div>
</div>

<script>
    async function start() {
        const log = document.getElementById('log');
        const wif = document.getElementById('wif').value;
        const file = document.getElementById('file').files[0];

        if (!wif || !file) return alert("Συμπλήρωσε WIF και αρχείο!");

        try {
            log.innerText = "Υπολογισμός Hash...";
            const buffer = await file.arrayBuffer();
            const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
            const hash = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');

            log.innerText = "Σύνδεση με το δίκτυο (Lite Mode)...";
            
            // Χρησιμοποιούμε ένα δημόσιο API για την αποστολή για να μην χρειαζόμαστε το mainnet.js
            const response = await fetch('https://rest.mainnet.cash/v1/wallet/hash_timestamp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    wif: wif,
                    hash: hash,
                    message: "0x6d02" 
                })
            });

            const result = await response.json();
            
            if (result.txId) {
                log.innerHTML = `✅ ΕΠΙΤΥΧΙΑ!<br>TXID: <a href="https://blockchair.com/bitcoin-cash/transaction/${result.txId}" target="_blank" style="color:#0f0">${result.txId}</a>`;
            } else {
                log.innerText = "Σφάλμα API: " + (result.message || "Αποτυχία");
            }
