<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BCH Simple Timestamp</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
padding-top:60px;
}

.card{
background:white;
padding:30px;
width:420px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
}

button{
background:#00c853;
color:white;
border:none;
font-weight:bold;
cursor:pointer;
}

#log{
margin-top:15px;
background:black;
color:#00ff00;
padding:10px;
font-family:monospace;
font-size:12px;
min-height:80px;
word-break:break-all;
}

</style>
</head>

<body>

<div class="card">

<h2>BCH File Timestamp</h2>

<input type="file" id="file">

<input type="text" id="wif" placeholder="Paste WIF private key">

<button onclick="timestamp()">Timestamp</button>

<div id="log">Ready.</div>

</div>

<script>

async function sha256(file){

const buffer = await file.arrayBuffer()

const hashBuffer = await crypto.subtle.digest("SHA-256",buffer)

return Array.from(new Uint8Array(hashBuffer))
.map(b=>b.toString(16).padStart(2,"0"))
.join("")

}

async function timestamp(){

const log = document.getElementById("log")

const file = document.getElementById("file").files[0]

if(!file){
alert("Select a file")
return
}

log.innerText="Hashing file..."

const hash = await sha256(file)

log.innerText="File hash:\n"+hash+"\n\nCreating OP_RETURN..."

const opreturn = "6a20"+hash

log.innerText="OP_RETURN data:\n"+opreturn

log.innerText += "\n\nNote:\nBroadcasting requires a BCH wallet backend.\nThis demo shows the hash that should be written on-chain."

}

</script>

</body>
</html>
