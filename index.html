<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>BCH Notary - Final Engine</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #00d54b; text-align: center; margin-top: 0; }
        input, button { width: 100%; margin: 10px 0; padding: 15px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 14px; }
        button { background: #00d54b; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #00b03e; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #log { background: #1a1a1a; color: #00ff00; padding: 15px; font-family: monospace; font-size: 12px; border-radius: 8px; min-height: 100px; word-break: break-all; margin-top: 20px; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="card">
    <h2>BCH Notary</h2>
    <input type="password" id="wif" placeholder="Επικόλλησε το WIF">
    <input type="file" id="file">
    <button id="btn" onclick="startNotary()">TIMESTAMP NOW</button>
    <div id="log">Status: Ready.</div>
</div>

<script type="module">
    import BBS from 'https://cdn.skypack.dev/mainnet-js';

    window.startNotary = async () => {
        const log = document.getElementById('log');
        const wif = document.getElementById('wif').value.trim();
        const file = document.getElementById('file').files[0];
        const btn = document.getElementById('btn');

        if (!wif || !file) return alert("Συμπλήρωσε WIF και Αρχείο!");

        btn.disabled = true;
        btn.innerText = "ΕΡΓΑΣΙΑ...";

        try {
            log.innerText = "1. Υπολογισμός SHA-256...";
            const buffer = await file.arrayBuffer();
            const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
            const hash = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
            
            log.innerText += "\n2. Σύνδεση με το Blockchain...";
            // Δημιουργία πορτοφαλιού απευθείας από το import
            const wallet = await BBS.Wallet.fromWIF(wif);
            
            log.innerText += "\n3. Αποστολή OP_RETURN: " + hash;
            const { txId } = await wallet.send([{ opReturn: ["0x6d02", hash] }]);

            log.innerHTML = `<b style="color:white">✅ ΕΠΙΤΥΧΙΑ!</b><br><br>TXID:<br><a href="https://blockchair.com/bitcoin-cash/transaction/${txId}" target="_blank" style="color:#00ff00; text-decoration:none">${txId}</a>`;
            btn.innerText = "ΟΛΟΚΛΗΡΩΘΗΚΕ";
        } catch (e) {
            log.innerText = "❌ ΣΦΑΛΜΑ: " + e.message;
            btn.disabled = false;
            btn.innerText = "TIMESTAMP NOW";
            console.error(e);
        }
    };
</script>

</body>
</html>
