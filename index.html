<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>BCH Notary</title></head>
<body>
<h1>BCH Notary</h1>
<input type="text" id="wif" placeholder="WIF Private Key"><br><br>
<input type="file" id="fileInput"><br><br>
<button id="btn">TIMESTAMP</button>
<div id="status">Ready</div>
<script>
async function hashFile(f){const b=await f.arrayBuffer();const h=await crypto.subtle.digest("SHA-256",b);return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,"0")).join("")}
document.getElementById("btn").onclick=async()=>{
const w=document.getElementById("wif").value.trim();
const f=document.getElementById("fileInput").files[0];
const s=document.getElementById("status");
if(!w||!f){s.textContent="Error: missing input";return}
s.textContent="Hashing...";
try{
const hash=await hashFile(f);
s.textContent="Sending...";
const r=await fetch("/api/timestamp",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({wif:w,fileHash:hash})});
const t=await r.text(); // Read as text first to debug
if(!r.ok)throw new Error(t);
const j=JSON.parse(t); // Then parse JSON
s.textContent="✅ "+j.txid;
}catch(e){s.textContent="Error: "+e.message}
}
</script>
</body>
</html>
